<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOGAF Lesson Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.primary { background: black; color: white; }
.secondary { background: #ddd; }

.section { margin-top: 15px; }
.box { background: #eef3ff; padding: 10px; border-radius: 8px; }
.takeaway { background: #e6f7ea; padding: 10px; border-radius: 8px; }

.hidden { display: none; }
.meta { font-size: 14px; color: #666; }
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="home">
  <div class="card">
    <h2>Lesson 1 - TOGAF Foundations</h2>
    <p>Understand TOGAF, architecture domains, ADM and requirements.</p>
    <button class="primary" onclick="showOverview()">Start Lesson</button>
  </div>
</div>

<!-- OVERVIEW -->
<div id="overview" class="hidden"></div>

<!-- LESSON -->
<div id="lesson" class="hidden"></div>

</div>

<script>

/* ===== LESSON DATA ===== */
const lessonCards = [
  { title:"What is TOGAF?", summary:"Framework for architecture decisions",
    concept:"TOGAF aligns business and IT change.",
    why:"Prevents disconnected decisions.",
    analogy:"Like a city blueprint.",
    detail:"Provides method, governance and structure.",
    example:"Without TOGAF, systems conflict.",
    exam:["Framework not project method"],
    takeaway:"Aligns business and IT." },

  { title:"Enterprise Architecture", summary:"Blueprint of organisation",
    concept:"Defines structure across business and tech.",
    why:"Gives whole view.",
    analogy:"Like a city map.",
    detail:"Links strategy to execution.",
    example:"Ensures systems align with goals.",
    exam:["Links strategy to systems"],
    takeaway:"Connects strategy to systems." },

  { title:"Architecture Domains", summary:"4 core areas",
    concept:"Business, Data, Application, Technology.",
    why:"Simplifies complexity.",
    analogy:"City layers.",
    detail:"Each domain has role.",
    example:"Changes affect all layers.",
    exam:["Know all 4 domains"],
    takeaway:"4 domains structure architecture." }
];

/* ===== STATE ===== */
let currentCard = 0;

/* ===== NAVIGATION ===== */
function showOverview() {
  hideAll();
  document.getElementById("overview").classList.remove("hidden");

  let html = `<h3>Lesson Cards</h3>`;

  lessonCards.forEach((c, i) => {
    html += `
      <div class="card">
        <h4>${c.title}</h4>
        <p>${c.summary}</p>
        <button class="primary" onclick="openCard(${i})">Open</button>
      </div>
    `;
  });

  document.getElementById("overview").innerHTML = html;
}

function openCard(index) {
  currentCard = index;
  hideAll();
  document.getElementById("lesson").classList.remove("hidden");
  renderCard();
}

function nextCard() {
  if (currentCard < lessonCards.length - 1) {
    currentCard++;
    renderCard();
  }
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    renderCard();
  }
}

function goOverview() {
  showOverview();
}

/* ===== RENDER ===== */
function renderCard() {
  const c = lessonCards[currentCard];

  document.getElementById("lesson").innerHTML = `
    <div class="card">

      <div class="meta">Card ${currentCard+1} of ${lessonCards.length}</div>

      <h2>${c.title}</h2>
      <p><b>${c.summary}</b></p>

      <div class="section">
        <h3>Concept</h3>
        <p>${c.concept}</p>
      </div>

      <div class="section">
        <h3>Why it matters</h3>
        <p>${c.why}</p>
      </div>

      <div class="section box">
        <h3>Analogy</h3>
        <p>${c.analogy}</p>
      </div>

      <div class="section">
        <button onclick="toggle('d')">Detail</button>
        <div id="d" class="hidden">${c.detail}</div>
      </div>

      <div class="section">
        <button onclick="toggle('e')">Example</button>
        <div id="e" class="hidden">${c.example}</div>
      </div>

      <div class="section">
        <button onclick="toggle('x')">Exam Notes</button>
        <div id="x" class="hidden">${c.exam.map(n=>`<p>${n}</p>`).join("")}</div>
      </div>

      <div class="section takeaway">
        <h3>Takeaway</h3>
        <p>${c.takeaway}</p>
      </div>

      <div class="section">
        <button onclick="goOverview()">Back</button>
        <button onclick="prevCard()" ${currentCard===0?"disabled":""}>Prev</button>
        <button class="primary" onclick="nextCard()" ${currentCard===lessonCards.length-1?"disabled":""}>Next</button>
      </div>

    </div>
  `;
}

/* ===== UTIL ===== */
function toggle(id){
  document.getElementById(id).classList.toggle("hidden");
}

function hideAll(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("overview").classList.add("hidden");
  document.getElementById("lesson").classList.add("hidden");
}

</script>

</body>
</html>
